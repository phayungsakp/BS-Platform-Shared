# Production Docker Compose Configuration
# Use: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: "3.8"

services:
  bs-api-core:
    build:
      args:
        BUILD_CONFIGURATION: Release
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_LOGGING__LOGLEVEL__DEFAULT=Warning
      - ASPNETCORE_LOGGING__LOGLEVEL__MICROSOFT=Warning
    # Remove development volumes
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: always
    # Production healthcheck
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sqlserver:
    environment:
      - SA_PASSWORD=${SQL_SA_PASSWORD:-YourStrong@Passw0rd}
      - MSSQL_PID=Standard
    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    restart: always

  redis:
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-YourRedisPassword}
    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: always

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: bs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - bs-platform-network
    depends_on:
      - bs-api-core
    restart: always
